http:
  method: DELETE
  url: "{{base_url}}/api/users/{{user_id}}"
  headers:
    - name: Authorization
      value: Bearer {{access_token}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

