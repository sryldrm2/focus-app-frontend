info:
  name: Are Friends (Arkadaş Mı)
  type: http
  seq: 4

http:
  method: GET
  url: "{{base_url}}/api/friendship/{{friend_id}}/are-friends"
  headers:
    - name: Authorization
      value: Bearer {{access_token}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: İki kullanıcının arkadaş olup olmadığını kontrol et (true/false)
