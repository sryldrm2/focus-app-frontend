info:
  name: Get User Friends (Kullanıcının Arkadaşları)
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/api/friendship/{{target_user_id}}/friends"
  headers:
    - name: Authorization
      value: Bearer {{access_token}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Belirtilen kullanıcının arkadaşlarını getir
