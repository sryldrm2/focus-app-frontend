info:
  name: Check Friendship (Arkadaşlık Kontrol Et)
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/api/friendship/{{friend_id}}/check"
  headers:
    - name: Authorization
      value: Bearer {{access_token}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: İki kullanıcı arasında arkadaşlık ilişkisini kontrol et
