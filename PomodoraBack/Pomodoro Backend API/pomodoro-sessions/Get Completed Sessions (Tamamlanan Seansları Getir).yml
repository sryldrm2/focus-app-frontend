
  
info:
  name: Get Completed Sessions (Tamamlanan Seansları Getir)
  desc: Kullanıcının tamamlanan tüm seanslarını getirir
  seq: 6
  type: http


http:
  method: GET
  url: "{{base_url}}/api/pomodoro-session/completed"
  auth:
    mode: bearer
    bearer: "{{access_token}}"

body:
  mode: none

tests:
  - name: Status is 200
    assert: res.getStatus() == 200
  - name: Response is array
    assert: Array.isArray(res.body.data)
