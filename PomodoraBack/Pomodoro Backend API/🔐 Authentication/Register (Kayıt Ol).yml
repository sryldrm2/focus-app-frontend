info:
  name: Register (Kayıt Ol)
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/api/auth/register"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "Ahmet",
        "surname": "Yılmaz",
        "nickname": "ahmetyilmaz",
        "email": "ahmet@example.com",
        "password": "Securepass123",
        "confirmPassword": "Securepass123"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Yeni kullanıcı kaydı oluştur
