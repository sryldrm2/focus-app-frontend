info:
  name: Get Current User (Mevcut Kullanıcı)
  type: http
  seq: 5

http:
  method: GET
  url: "{{base_url}}/api/auth/me"
  headers:
    - name: Authorization
      value: Bearer {{access_token}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Oturum açmış kullanıcının bilgisini getir
