info:
  name: Refresh Token (Token Yenile)
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/api/auth/refresh-token"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "refreshToken": "{{refresh_token}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Refresh token kullanarak yeni access token al
