info:
  name: Reject Friend Request (İstek Reddet)
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/api/friendrequest/{{friend_request_id}}/reject"
  headers:
    - name: Authorization
      value: Bearer {{access_token}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Gelen arkadaş isteğini reddet
