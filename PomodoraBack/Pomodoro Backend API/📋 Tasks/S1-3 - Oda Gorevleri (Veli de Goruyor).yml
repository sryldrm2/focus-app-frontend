info:
  name: "S1-3 - Oda Gorevlerini Listele (Veli de goruyor)"
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/api/tasks/workspaces/{{workspace_id}}"
  headers:
    - name: Authorization
      value: "Bearer {{second_access_token}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  SENARYO 1 - Adim 3: Veli de AYNI oda gorevlerini gorur!
  second_access_token = Veli'nin token'ı
  
  Beklenen: Ali'nin gorduğü liste ile AYNI gorevler
  Bu, ortak calisma alaninin isini kanitlar.
