info:
  name: "VAL-2 - Zaten Odada Olan Kişiye Davet (HATA beklenir)"
  type: http
  seq: 11

http:
  method: POST
  url: "{{base_url}}/api/workspaces/invitations"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: "Bearer {{access_token}}"
  body:
    type: json
    data: |-
      {
        "workspaceId": "{{workspace_id}}",
        "receiverId": "{{second_user_id}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  VALIDASYON 2: Zaten odada olan Veli'ye tekrar davet gondermeyi dene.
  Veli adım 9'da odaya katilmisti.
  
  Beklenen HATA: "Kullanici zaten odada."
  HTTP Status: 400
