info:
  name: "3 - Login Ali → access_token al"
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/api/auth/login"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "emailOrNickname": "ali@test.com",
        "password": "Ali123!"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  ADIM 3: Ali olarak login ol.
  Response'dan gelen accessToken'ı kopyala →
  opencollection.yml → access_token değerine yapıştır.
  userId'yi de kopyala → user_id değerine yapıştır.
